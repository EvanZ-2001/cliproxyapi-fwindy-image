name: build-fwindy-cliproxyapi-image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Fwindy/CLIProxyAPI ref to build. Leave empty for latest v* tag."
        required: false
        type: string
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-fwindy-cliproxyapi-image-${{ github.event.inputs.ref || 'latest' }}
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: Fwindy/CLIProxyAPI
  IMAGE_NAME: cliproxyapi-fwindy

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve source ref
        id: source
        env:
          REQUESTED_REF: ${{ github.event.inputs.ref || '' }}
        run: |
          set -euo pipefail

          ref="${REQUESTED_REF}"
          if [ -z "${ref}" ]; then
            ref="$(
              git ls-remote --tags --refs --sort=-v:refname \
                "https://github.com/${SOURCE_REPOSITORY}.git" 'v*' |
                awk 'NR == 1 { sub("refs/tags/", "", $2); print $2 }'
            )"
          fi

          if [ -z "${ref}" ]; then
            echo "::error::Could not resolve a source ref."
            exit 1
          fi

          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout Fwindy/CLIProxyAPI
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ steps.source.outputs.ref }}
          fetch-depth: 0

      - name: Refresh models catalog
        run: |
          set -euo pipefail
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Generate image metadata
        id: meta
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/${IMAGE_NAME}"
          ref="${{ steps.source.outputs.ref }}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          safe_ref="$(printf '%s' "${ref}" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
          echo "safe_ref=${safe_ref}" >> "${GITHUB_OUTPUT}"

          {
            echo "tags<<EOF"
            echo "${image}:${safe_ref}"
            echo "${image}:sha-${commit}"
            if [[ "${ref}" == v* ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ env.SOURCE_REPOSITORY }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.version=${{ steps.source.outputs.ref }}
          build-args: |
            VERSION=${{ steps.source.outputs.ref }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
