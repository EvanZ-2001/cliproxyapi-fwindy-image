name: build-fwindy-cliproxyapi-image

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Fwindy/CLIProxyAPI ref to build. Leave empty for latest v* tag."
        required: false
        type: string
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: read
  packages: write

concurrency:
  group: build-fwindy-cliproxyapi-image-${{ github.event.inputs.ref || 'latest' }}
  cancel-in-progress: false

env:
  SOURCE_REPOSITORY: Fwindy/CLIProxyAPI
  IMAGE_NAME: cliproxyapi-fwindy

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.metadata.outputs.image }}
      ref: ${{ steps.source.outputs.ref }}
      safe_ref: ${{ steps.source.outputs.safe_ref }}
      should_build: ${{ steps.decision.outputs.should_build }}

    steps:
      - name: Resolve source ref
        id: source
        env:
          REQUESTED_REF: ${{ github.event.inputs.ref || '' }}
        run: |
          set -euo pipefail

          ref="${REQUESTED_REF}"
          if [ -z "${ref}" ]; then
            ref="$(
              git ls-remote --tags --refs --sort=-v:refname \
                "https://github.com/${SOURCE_REPOSITORY}.git" 'v*' |
                awk 'NR == 1 { sub("refs/tags/", "", $2); print $2 }'
            )"
          fi

          if [ -z "${ref}" ]; then
            echo "::error::Could not resolve a source ref."
            exit 1
          fi

          safe_ref="$(printf '%s' "${ref}" | tr '/:@' '---' | tr -c 'A-Za-z0-9_.-' '-')"

          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"
          echo "safe_ref=${safe_ref}" >> "${GITHUB_OUTPUT}"

      - name: Generate image metadata
        id: metadata
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          image="ghcr.io/${owner}/${IMAGE_NAME}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        if: github.event_name == 'schedule'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check existing image tag
        id: existing
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail

          image="${{ steps.metadata.outputs.image }}"
          safe_ref="${{ steps.source.outputs.safe_ref }}"

          if docker manifest inspect "${image}:${safe_ref}" >/dev/null 2>&1; then
            exists=true
          else
            exists=false
          fi

          echo "exists=${exists}" >> "${GITHUB_OUTPUT}"

      - name: Decide whether to build
        id: decision
        run: |
          set -euo pipefail

          event="${{ github.event_name }}"
          ref="${{ steps.source.outputs.ref }}"
          image="${{ steps.metadata.outputs.image }}"
          safe_ref="${{ steps.source.outputs.safe_ref }}"
          exists="${{ steps.existing.outputs.exists }}"

          if [ "${event}" = "workflow_dispatch" ]; then
            should_build=true
            reason="Manual dispatch requested ${ref}; build will run."
          elif [ "${exists}" = "true" ]; then
            should_build=false
            reason="Image ${image}:${safe_ref} already exists; scheduled build will be skipped."
          else
            should_build=true
            reason="Image ${image}:${safe_ref} is missing; scheduled build will run."
          fi

          echo "should_build=${should_build}" >> "${GITHUB_OUTPUT}"
          echo "::notice::${reason}"

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Fwindy/CLIProxyAPI
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPOSITORY }}
          ref: ${{ needs.check.outputs.ref }}
          fetch-depth: 0

      - name: Refresh models catalog
        run: |
          set -euo pipefail
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json

      - name: Optimize Dockerfile for cross-platform builds
        run: |
          set -euo pipefail

          sed -i 's|^FROM golang:|FROM --platform=$BUILDPLATFORM golang:|' Dockerfile
          awk '
            /^ARG VERSION=dev$/ && !seen {
              print "ARG TARGETOS=linux"
              print "ARG TARGETARCH"
              seen = 1
            }
            {
              gsub(/CGO_ENABLED=0 GOOS=linux go build/, "CGO_ENABLED=0 GOOS=${TARGETOS:-linux} GOARCH=${TARGETARCH} go build")
              print
            }
          ' Dockerfile > Dockerfile.cross
          mv Dockerfile.cross Dockerfile

      - name: Generate image metadata
        id: meta
        run: |
          set -euo pipefail

          image="${{ needs.check.outputs.image }}"
          ref="${{ needs.check.outputs.ref }}"
          commit="$(git rev-parse --short HEAD)"
          build_date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          safe_ref="${{ needs.check.outputs.safe_ref }}"

          echo "image=${image}" >> "${GITHUB_OUTPUT}"
          echo "commit=${commit}" >> "${GITHUB_OUTPUT}"
          echo "build_date=${build_date}" >> "${GITHUB_OUTPUT}"
          echo "safe_ref=${safe_ref}" >> "${GITHUB_OUTPUT}"

          {
            echo "tags<<EOF"
            echo "${image}:${safe_ref}"
            echo "${image}:sha-${commit}"
            if [[ "${ref}" == v* ]]; then
              echo "${image}:latest"
            fi
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ env.SOURCE_REPOSITORY }}
            org.opencontainers.image.revision=${{ steps.meta.outputs.commit }}
            org.opencontainers.image.created=${{ steps.meta.outputs.build_date }}
            org.opencontainers.image.version=${{ needs.check.outputs.ref }}
          build-args: |
            VERSION=${{ needs.check.outputs.ref }}
            COMMIT=${{ steps.meta.outputs.commit }}
            BUILD_DATE=${{ steps.meta.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
